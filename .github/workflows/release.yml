name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libegl1-mesa-dev

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          tar czf phonto-linux-x86_64.tar.gz -C target/release phonto

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: phonto-linux-x86_64.tar.gz
